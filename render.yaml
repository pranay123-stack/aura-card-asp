services:
  - type: web
    name: aura-card-asp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # free tier cold-starts ~50s; starter keeps it warm for the demo
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- secrets: set these in the Render dashboard, never in this file ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET_KEY
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: PAY_TO
        sync: false

      # --- non-secret config ---
      - key: PUBLIC_URL
        value: https://aura-card-asp.onrender.com # change to your real Render URL
      - key: PRICE
        value: "$0.50"
      - key: FEE_USDT
        value: "0.5"
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: NODE_ENV
        value: production
